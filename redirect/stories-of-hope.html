<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    
    <!-- Instant redirect -->
    <meta http-equiv="refresh" content="0; url=https://obey.tools/stories-of-hope.html">
    
    <!-- Better for SEO and browsers -->
    <link rel="canonical" href="https://obey.tools/stories-of-hope.html">
    
    <script>
        // Force redirect (works even if meta refresh is blocked)
        window.location.replace("https://obey.tools/stories-of-hope.html");
    </script>
</head>
<body>
    <p>Redirecting to Stories of Hope...</p>
</body>
</html>
