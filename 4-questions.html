<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discipleship Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    background: #f2f2f7;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 0 0;
  }
  /* ── Section wrapper ── */
  .section {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 48px 24px;
    opacity: 0;
    animation: fadeIn 0.5s ease forwards;
  }
  .divider {
    width: calc(100% - 32px);
    max-width: 520px;
    display: block;
    margin: 4px auto;
  }
  .section:nth-child(1) { animation-delay: 0.0s; }
  .section:nth-child(2) { animation-delay: 0.15s; }
  .section:nth-child(3) { animation-delay: 0.3s; }
  .section:nth-child(4) { animation-delay: 0.45s; }
  .section:nth-child(5) { animation-delay: 0.6s; }
  .section:last-child { border-bottom: none; }
  @keyframes fadeIn { to { opacity: 1; } }
  .svg-wrap { width: 100%; max-width: 480px; }
  .svg-wrap svg { width: 100%; height: auto; display: block; }
  /* ── Labels ── */
  .label-top {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(16px, 4vw, 20px);
    letter-spacing: 0.18em;
    color: #555;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .section-number {
    font-family: 'Amatic SC', cursive;
    font-weight: 700;
    font-size: clamp(28px, 7vw, 36px);
    letter-spacing: 0.1em;
    color: #aaa;
    margin-bottom: 10px;
  }
  .verse {
    font-family: 'Amatic SC', cursive;
    font-weight: 700;
    font-size: clamp(28px, 7vw, 38px);
    color: #111;
    margin-top: 10px;
  }
  /* ── Section 5 (When / Goals) ── */
  .when-title {
    font-family: 'Amatic SC', cursive;
    font-weight: 700;
    font-size: clamp(32px, 8vw, 48px);
    color: #111;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }
  .goals-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(18px, 4vw, 24px);
    letter-spacing: 0.12em;
    color: #aaa;
    margin-bottom: 24px;
  }
  .goals-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: center;
  }
  .goal-item {
    font-family: 'Amatic SC', cursive;
    font-weight: 700;
    font-size: clamp(24px, 6vw, 34px);
    color: #111;
    letter-spacing: 0.06em;
    border-bottom: 2px solid #111;
    padding-bottom: 2px;
    min-width: 140px;
    text-align: center;
  }
  @media (max-width: 600px) {
    .section { padding: 36px 12px; }
    .svg-wrap { max-width: 100%; }
  }
  /* ── Tap-to-complete ── */
  .section {
    position: relative;
    cursor: pointer;
    transition: background 0.3s ease, box-shadow 0.3s ease;
    user-select: none;
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.06);
    margin: 8px 16px;
    width: calc(100% - 32px);
    max-width: 520px;
  }
  .section:active { transform: scale(0.98); }
  .section.completed {
    background: #00D084;
    box-shadow: 0 4px 16px rgba(0,208,132,0.35), 0 1px 4px rgba(0,0,0,0.08);
  }
  .section.completed .label-top,
  .section.completed .section-number,
  .section.completed .verse,
  .section.completed .when-title,
  .section.completed .goals-label { color: rgba(255,255,255,0.95); }
  .section.completed .goal-item {
    color: #fff;
    border-bottom-color: rgba(255,255,255,0.7);
  }
  .section.completed .svg-wrap svg { filter: invert(1) brightness(10); }
  .section.completed img { filter: brightness(0) invert(1); opacity: 0.9; }
  /* Checkbox */
  .section-checkbox {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 32px;
    height: 32px;
    border: 2.5px solid #c6c6c8;
    border-radius: 50%;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    z-index: 10;
    pointer-events: none;
  }
  .section-checkbox::after {
    content: '✓';
    color: #00D084;
    font-size: 20px;
    font-weight: 700;
    opacity: 0;
    transform: scale(0);
    transition: all 0.2s ease;
  }
  .section.completed .section-checkbox {
    background: #fff;
    border-color: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .section.completed .section-checkbox::after {
    opacity: 1;
    transform: scale(1);
  }
  /* Progress bar */
  .progress-bar-container {
    width: 100%;
    padding: 12px 24px;
    background: #f2f2f7;
    border-bottom: none;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .progress-bar {
    height: 6px;
    background: #e5e5ea;
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #00D084;
    width: 0%;
    transition: width 0.5s ease;
  }
  .progress-text {
    margin-top: 6px;
    font-family: 'Amatic SC', cursive;
    font-weight: 700;
    font-size: 16px;
    color: #8e8e93;
    text-align: center;
    letter-spacing: 0.05em;
  }
  /* Reset button */
  .reset-bar {
    width: 100%;
    padding: 16px 24px 48px;
    display: flex;
    justify-content: center;
  }
  .reset-btn {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.12em;
    font-size: 16px;
    padding: 12px 40px;
    border: none;
    border-radius: 8px;
    background: #f2f2f7;
    color: #3a3a3c;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .reset-btn:active { background: #e5e5ea; transform: scale(0.97); }
</style>
</head>

  <div class="section-checkbox"></div>
  <div class="section-number" style="font-size: clamp(14px,3.5vw,18px); letter-spacing:0.28em;">4.</div>
  <div class="when-title">WHEN?</div>
  <div class="goals-label">GOALS</div>
  <div class="goals-list">
    <div class="goal-item">Share?</div>
    <div class="goal-item">Pray?</div>
    <div class="goal-item">Meet?</div>
  </div>
</div>
<div class="reset-bar">
  <button class="reset-btn" onclick="resetAll(event)">RESET</button>
</div>
<script>
  const STORAGE_KEY = 'discipleship-guide-progress';
  const TOTAL = 6;
  function toggleSection(el) {
    const id = el.dataset.id;
    el.classList.toggle('completed');
    saveProgress();
    updateProgress();
  }
  function saveProgress() {
    const completed = [];
    document.querySelectorAll('.section.completed').forEach(function(s) {
      completed.push(s.dataset.id);
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(completed));
  }
  function loadProgress() {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    saved.forEach(function(id) {
      const el = document.querySelector('[data-id="' + id + '"]');
      if (el) el.classList.add('completed');
    });
    updateProgress();
  }
  function updateProgress() {
    const completed = document.querySelectorAll('.section.completed').length;
    const pct = (completed / TOTAL) * 100;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = completed + ' of ' + TOTAL + ' completed';
  }
  function resetAll(e) {
    e.stopPropagation();
    if (confirm('Reset all progress?')) {
      document.querySelectorAll('.section.completed').forEach(function(s) {
        s.classList.remove('completed');
      });
      localStorage.removeItem(STORAGE_KEY);
      updateProgress();
    }
  }
  window.addEventListener('DOMContentLoaded', loadProgress);
</script>
