    <script type="module">
        import { supabase } from './supabase.js'
        import { fetchRole } from './auth.js'

        async function checkLeaderBtn(session, source) {
            const btn        = document.getElementById('btn-leader-tools')

            if (!session?.user) {
                if (btn)        btn.style.display        = 'none'
                return
            }

            const role = await fetchRole(session.user.id)

            if (!btn) {
                console.error('[LeaderBtn] ERROR: #btn-leader-tools not found in DOM')
                return
            }

            if (role === 'leader') {
                // Explicit reveal — clear every possible source of hiding
                btn.removeAttribute('hidden')
                btn.classList.remove('hidden')
                btn.style.display = 'block'
            } else {
                btn.style.display = 'none'
            }
        }

        // Mirror initLeaderPage() exactly:
        // getSession() — reads localStorage immediately, fires even if INITIAL_SESSION is delayed
        supabase.auth.getSession().then(({ data: { session } }) => {
            checkLeaderBtn(session, 'getSession')
        })
        // onAuthStateChange — covers INITIAL_SESSION, TOKEN_REFRESHED, SIGNED_IN, SIGNED_OUT
        supabase.auth.onAuthStateChange((_event, session) => {
            checkLeaderBtn(session, 'onAuthStateChange/' + _event)
        })
    </script>
    <style>

        <button id="install-dismiss" aria-label="Dismiss">&#x2715;</button>
    </div>

    <script>
    (function () {
        var DISMISSED_KEY = 'obeytools_install_banner_dismissed'
        if (localStorage.getItem(DISMISSED_KEY)) return

        var banner  = document.getElementById('install-banner')
        var text    = document.getElementById('install-text')
        var btn     = document.getElementById('install-btn')
        var dismiss = document.getElementById('install-dismiss')
        var deferredPrompt = null

        // Chromium: capture and hold the install prompt
        window.addEventListener('beforeinstallprompt', function (e) {
            e.preventDefault()
            deferredPrompt = e
            text.textContent = 'Add to your home screen for the best experience.'
            btn.style.display = 'inline-block'
            banner.style.display = 'flex'
        })

        // Chromium: trigger native prompt on button click
        btn.addEventListener('click', function () {
            if (!deferredPrompt) return
            deferredPrompt.prompt()
            deferredPrompt.userChoice.then(function () {
                deferredPrompt = null
                banner.style.display = 'none'
                localStorage.setItem(DISMISSED_KEY, '1')
            })
        })

        // iPhone / iPad Safari: show share instructions (no native prompt available)
        var isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent) ||
                    (/Macintosh/.test(navigator.userAgent) && navigator.maxTouchPoints > 1)
        var isStandalone = window.navigator.standalone === true
        if (isIOS && !isStandalone) {
            window.addEventListener('load', function () {
                if (deferredPrompt) return  // Chromium already showing
                text.textContent = 'Tap \u238b Share, then \u201cAdd to Home Screen\u201d to install.'
                banner.style.display = 'flex'
            })
        }

        // Dismiss button
        dismiss.addEventListener('click', function () {
            banner.style.display = 'none'
            localStorage.setItem(DISMISSED_KEY, '1')
        })
    })()
    </script>
