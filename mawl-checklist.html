<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAWL Checklist — OBEY.TOOLS</title>
    <script type="module">
        import { supabase } from './supabase.js';
        window.supabase = supabase;
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; background: #f2f2f7; min-height: 100vh; color: #000; line-height: 1.4; padding-bottom: 60px; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; min-height: 100vh; }

        /* Auth section */
        .auth-section { padding: 12px 16px; background: #f2f2f7; border-bottom: 0.5px solid #c6c6c8; }
        .auth-section input { width: 100%; padding: 10px 14px; border: 1px solid #c6c6c8; border-radius: 8px; font-size: 15px; background: #fff; outline: none; margin-bottom: 8px; font-family: inherit; }
        .auth-section input:focus { border-color: #3a3a3c; }
        .auth-buttons { display: flex; gap: 8px; }
        .auth-buttons button { flex: 1; padding: 10px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }
        .auth-btn-primary { background: #3a3a3c; color: #fff; }
        .auth-btn-secondary { background: #e5e5ea; color: #3a3a3c; }
        .auth-status { display: flex; align-items: center; justify-content: space-between; }
        .auth-status-text { font-size: 13px; color: #8e8e93; }
        .auth-logout-btn { padding: 6px 14px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; background: #e5e5ea; color: #3a3a3c; font-family: inherit; }

        /* Header */
        .header { padding: 30px 20px 20px; background: #f2f2f7; border-bottom: 0.5px solid #c6c6c8; text-align: center; }
        .header h1 { font-family: 'Bebas Neue', cursive; font-size: 42px; font-weight: 400; margin-bottom: 8px; letter-spacing: 2px; color: #00D084; -webkit-text-stroke: 2px #000; }
        .header .subtitle { font-size: 15px; color: #8e8e93; font-weight: 500; }

        /* Placeholder body */
        .placeholder { padding: 48px 24px; text-align: center; color: #8e8e93; font-size: 15px; line-height: 1.6; }

        /* Notification */
        .notification { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 12px 20px; border-radius: 8px; font-size: 15px; font-weight: 500; z-index: 1000; opacity: 0; animation: notificationSlide 3s ease; }
        @keyframes notificationSlide { 0% { opacity:0; transform:translateX(-50%) translateY(-20px); } 10% { opacity:1; transform:translateX(-50%) translateY(0); } 90% { opacity:1; transform:translateX(-50%) translateY(0); } 100% { opacity:0; transform:translateX(-50%) translateY(-20px); } }

        @media (min-width: 768px) {
            .container { border-radius: 12px; margin: 20px auto; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
        }
    </style>
</head>
<body>

    <div style="display:flex; gap:10px; justify-content:center; padding:20px 16px 8px;">
        <a href="index.html" style="display:inline-block; background:#000; color:#fff; font-family:-apple-system,BlinkMacSystemFont,sans-serif; font-weight:700; font-size:15px; padding:11px 22px; border-radius:50px; text-decoration:none; white-space:nowrap;">Home</a>
        <a href="leader-tools.html" style="display:inline-block; background:#00D084; color:#fff; font-family:-apple-system,BlinkMacSystemFont,sans-serif; font-weight:700; font-size:15px; padding:11px 22px; border-radius:50px; text-decoration:none; white-space:nowrap;">← Leader Tools</a>
    </div>

    <div class="container">

        <div class="auth-section" id="auth-section">
            <div id="auth-form">
                <input type="email" id="auth-email" placeholder="Email">
                <input type="password" id="auth-password" placeholder="Password">
                <div class="auth-buttons">
                    <button class="auth-btn-primary" onclick="authSignUp()">Sign Up</button>
                    <button class="auth-btn-secondary" onclick="authLogIn()">Log In</button>
                </div>
            </div>
            <div class="auth-status" id="auth-status" style="display:none">
                <span class="auth-status-text" id="auth-status-text">Not signed in</span>
                <button class="auth-logout-btn" onclick="authLogOut()">Log Out</button>
            </div>
        </div>

        <div class="header">
            <h1>MAWL Checklist</h1>
            <div class="subtitle">Model · Assist · Watch · Leave</div>
        </div>

        <div class="placeholder">
            Content coming soon.
        </div>

    </div>

    <script>
        function showNotification(message) {
            const el = document.createElement('div');
            el.className  = 'notification';
            el.textContent = message;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        function updateAuthUI(user) {
            window._supabaseUser = user;
            const form   = document.getElementById('auth-form');
            const status = document.getElementById('auth-status');
            const text   = document.getElementById('auth-status-text');
            if (user) {
                form.style.display   = 'none';
                status.style.display = 'flex';
                text.textContent     = 'Signed in as ' + user.email;
            } else {
                form.style.display   = 'block';
                status.style.display = 'none';
                text.textContent     = 'Not signed in';
            }
        }

        async function authSignUp() {
            const email    = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            const { error } = await window.supabase.auth.signUp({ email, password });
            if (error) showNotification(error.message);
            else        showNotification('Check your email to confirm sign up.');
        }

        async function authLogIn() {
            const email    = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            const { error } = await window.supabase.auth.signInWithPassword({ email, password });
            if (error) showNotification(error.message);
        }

        async function authLogOut() {
            const { error } = await window.supabase.auth.signOut();
            if (error) showNotification(error.message);
        }

        document.addEventListener('DOMContentLoaded', () => {
            window.supabase.auth.getSession().then(({ data: { session } }) => {
                updateAuthUI(session?.user ?? null);
            });
            window.supabase.auth.onAuthStateChange((_event, session) => {
                updateAuthUI(session?.user ?? null);
            });
        });
    </script>

</body>
</html>
