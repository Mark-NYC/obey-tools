<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="assets/images/favicons/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicons/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/images/favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/images/favicons/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="assets/images/favicons/android-chrome-512x512.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-title" content="Obey Tools">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap">
    <title>MAWL Checklist — OBEY.TOOLS</title>
    <script type="module" src="/i18n.js"></script>
    <script type="module">
        import { supabase } from './supabase.js'
        import { authSignUp, authLogIn, authLogOut, initLeaderPage, showNotification } from './auth.js'
        window.authSignUp = authSignUp
        window.authLogIn  = authLogIn
        window.authLogOut = authLogOut

        let _activeChecklistId = null
        let _activeChecklistCreatedBy = null  // tracks creator of selected checklist
        let _networkRole = null      // 'owner' | 'leader' | 'member' | null
        let _playbookSections = []   // network_checklist_sections rows
        let _playbookItems = []      // network_checklist_items rows
        let _playbookProgress = {}   // item_id → { mawl_stage: 'M'|'A'|'W'|'L'|null }
        let _renderGeneration = 0    // incremented each renderPlaybookGrid call; stale renders abort


        // ── localStorage persistence ──────────────────────────────────────────
        const LS_NETWORK   = 'mawl_last_network'
        const LS_CHECKLIST = 'mawl_last_checklist'
        function saveLastNetwork(id)   { id ? localStorage.setItem(LS_NETWORK, id)   : localStorage.removeItem(LS_NETWORK) }
        function saveLastChecklist(id) { id ? localStorage.setItem(LS_CHECKLIST, id) : localStorage.removeItem(LS_CHECKLIST) }

        // ── Network header helpers ─────────────────────────────────────────────
        function updateNetworkDisplay() {
            const sel = document.getElementById('network-select')
            const opt = sel?.options[sel.selectedIndex]
            const name = (opt && opt.value) ? opt.textContent : null
            const el = document.getElementById('network-display-text')
            if (el) el.textContent = name ?? '—'
        }

        function hideNetworkPicker() {
            document.getElementById('network-picker-panel').style.display = 'none'
        }

        window.showNetworkPicker = function () {
            const panel = document.getElementById('network-picker-panel')
            if (panel.style.display === 'block') {
                panel.style.display = 'none'
            } else {
                panel.style.display = 'block'
                const sel = document.getElementById('network-select')
                if (sel.options.length > 1) sel.style.display = 'block'
            }
        }

        // ── Tab switching ──────────────────────────────────────────────────────
        window.switchTab = function (name) {
            document.getElementById('tab-people').style.display   = name === 'people'   ? 'block' : 'none'
            document.getElementById('tab-playbook').style.display = name === 'playbook' ? 'block' : 'none'
            document.getElementById('tab-btn-people').classList.toggle('active',   name === 'people')
            document.getElementById('tab-btn-playbook').classList.toggle('active', name === 'playbook')
        }

        async function loadNetworks(autoSelectId = null) {
            const { data: { session } } = await supabase.auth.getSession()
            if (!session?.user) return

            const networkLoading = document.getElementById('network-loading')
            const networkSelect  = document.getElementById('network-select')
            const networkEmpty   = document.getElementById('network-empty')

            networkLoading.style.display = 'block'
            networkSelect.style.display  = 'none'
            networkEmpty.style.display   = 'none'

            // Query networks directly — RLS on the networks table filters to
            // only rows this user can see.  Avoids going through network_members
            // which has a separate RLS SELECT policy that silently blocks direct
            // client queries even when the underlying rows exist.
            const { data: networks, error } = await supabase
                .from('networks')
                .select('id, name')
                .order('name')

            if (error) console.error('[loadNetworks] error:', error)

            networkLoading.style.display = 'none'

            if (error || !networks || networks.length === 0) {
                networkEmpty.style.display = 'block'
                document.getElementById('network-picker-panel').style.display = 'block'
                return
            }

            networkSelect.innerHTML = '<option value="">— Choose a network —</option>'
            networks.forEach(net => {
                const opt = document.createElement('option')
                opt.value = net.id
                opt.textContent = net.name
                networkSelect.appendChild(opt)
            })
            networkSelect.style.display = 'block'

            // Explicit autoSelectId (after creating a new network) takes priority;
            // otherwise try to restore the last network from localStorage.
            const networkToSelect    = autoSelectId || localStorage.getItem(LS_NETWORK)
            const checklistToRestore = autoSelectId ? null : localStorage.getItem(LS_CHECKLIST)

            if (networkToSelect) {
                const exists = [...networkSelect.options].some(o => o.value === networkToSelect)
                if (exists) {
                    networkSelect.value = networkToSelect
                    saveLastNetwork(networkToSelect)
                    await loadChecklists(networkToSelect, checklistToRestore)
                    updateNetworkDisplay()
                    hideNetworkPicker()
                } else {
                    // Previously saved network is no longer accessible — clear both.
                    saveLastNetwork(null)
                    saveLastChecklist(null)
                    document.getElementById('network-picker-panel').style.display = 'block'
                }
            } else {
                document.getElementById('network-picker-panel').style.display = 'block'
            }
        }

        window.onNetworkChange = function () {
            const networkId = document.getElementById('network-select').value
            saveLastNetwork(networkId || null)
            saveLastChecklist(null)   // previous checklist belongs to old network — forget it
            document.getElementById('create-network-form').style.display = 'none'
            document.getElementById('create-network-input').value = ''
            loadChecklists(networkId)
            updateNetworkDisplay()
            hideNetworkPicker()
        }

        window.showCreateNetwork = function () {
            document.getElementById('network-picker-panel').style.display = 'block'
            const form = document.getElementById('create-network-form')
            form.style.display = 'block'
            document.getElementById('create-network-input').focus()
        }

        window.cancelCreateNetwork = function () {
            document.getElementById('create-network-form').style.display = 'none'
            document.getElementById('create-network-input').value = ''
        }

        window.submitCreateNetwork = async function () {
            const input = document.getElementById('create-network-input')
            const name  = input.value.trim()
            if (!name) { input.focus(); return }

            // Prevent duplicate network names (case-insensitive, trimmed)
            const networkSelect = document.getElementById('network-select')
            const existingNames = networkSelect
                ? Array.from(networkSelect.options).filter(o => o.value !== '').map(o => o.textContent.trim().toLowerCase())
                : []
            if (existingNames.includes(name.toLowerCase())) {
                showNotification(window.t('mawl.network_exists'))
                input.focus()
                return
            }

            const btn = document.getElementById('create-network-submit')
            btn.disabled = true
            btn.textContent = window.t('mawl.creating')

            const { data: { session } } = await supabase.auth.getSession()

            // Insert without .select() — avoids RLS RETURNING race with the
            // handle_new_network trigger (trigger adds network_members row, but
            // PostgREST evaluates the RETURNING clause before that row is visible
            // to the SELECT policy, so .select('id') always fails here).
            const { error: insertError } = await supabase
                .from('networks')
                .insert({ name, created_by: session.user.id })

            btn.disabled = false
            btn.textContent = window.t('mawl.create')

            if (insertError) {
                console.error('Network creation error:', insertError)
                showNotification(window.t('mawl.could_not_create'))
                return
            }

            input.value = ''
            document.getElementById('create-network-form').style.display = 'none'

            // Separate follow-up query — by this point the trigger has committed
            // the network_members row, so the SELECT policy on networks passes.
            const { data: newest, error: selectError } = await supabase
                .from('networks')
                .select('id')
                .eq('created_by', session.user.id)
                .order('created_at', { ascending: false })
                .limit(1)
                .single()

            if (selectError) console.warn('Could not fetch new network id:', selectError)
            await loadNetworks(newest?.id ?? null)
        }

        async function loadChecklists(networkId, autoSelectId = null) {
            // Reset all state on every network change
            _activeChecklistId = null
            _activeChecklistCreatedBy = null
            _playbookProgress = {}
            _networkRole = null
            _playbookItems = []
            _playbookSections = []
            const gridSection = document.getElementById('mawl-grid-section')
            gridSection.style.display = 'none'
            gridSection.innerHTML = ''
            document.getElementById('manage-playbook-section').style.display = 'none'

            const section = document.getElementById('checklist-section')
            if (!networkId) { section.style.display = 'none'; return }

            section.style.display = 'block'
            const loading  = document.getElementById('checklist-loading')
            const empty    = document.getElementById('checklist-empty')
            const clSelect = document.getElementById('checklist-select')

            loading.style.display = 'block'
            empty.style.display   = 'none'
            clSelect.innerHTML = `<option value="">${window.t('mawl.select_person')}</option>`
            document.getElementById('create-checklist-form').style.display = 'none'
            document.getElementById('create-checklist-input').value = ''

            const [{ data, error }] = await Promise.all([
                supabase
                    .from('mawl_checklists')
                    .select('id, coached_name, created_at, created_by')
                    .eq('network_id', networkId)
                    .order('created_at', { ascending: false }),
                loadNetworkRole(networkId),
                loadPlaybook(networkId),
            ])

            loading.style.display = 'none'

            if (error) {
                console.error('[loadChecklists] SELECT failed (full):', error)
                empty.style.display = 'block'
                updateManagePlaybook(networkId)
                return
            }

            if (!data || data.length === 0) {
                empty.style.display = 'block'
                updateManagePlaybook(networkId)
                return
            }

            data.forEach(cl => {
                const opt = document.createElement('option')
                opt.value = cl.id
                opt.dataset.createdBy = cl.created_by
                opt.textContent = cl.coached_name
                clSelect.appendChild(opt)
            })
            updateManagePlaybook(networkId)

            if (autoSelectId) {
                if (data.some(cl => cl.id === autoSelectId)) {
                    // Guard against a second concurrent loadChecklists call (e.g. the dual-fire of
                    // getSession().then and onAuthStateChange(INITIAL_SESSION) at startup).  The
                    // first call to reach this point sets _activeChecklistId via renderPlaybookGrid;
                    // the second must not overwrite it with a new renderPlaybookGrid call that
                    // would increment _renderGeneration and abort any in-flight user-triggered render.
                    if (_activeChecklistId === null) selectChecklist(autoSelectId)
                } else {
                    // Saved checklist no longer belongs to this network — clear it.
                    saveLastChecklist(null)
                }
            }
        }

        function selectChecklist(id) {
            if (!id) return
            saveLastChecklist(id)
            const clSelect = document.getElementById('checklist-select')
            if (clSelect) clSelect.value = id
            const activeOpt = clSelect?.querySelector(`option[value="${id}"]`)
            _activeChecklistCreatedBy = activeOpt?.dataset.createdBy ?? null
            renderPlaybookGrid(id)
        }
        // Expose to global scope so the dropdown onchange attribute can call it.
        window.selectChecklist = selectChecklist

        // ── Network role + playbook loading ──────────────────────────────────
        async function loadNetworkRole(networkId) {
            const { data: { session } } = await supabase.auth.getSession()
            if (!session?.user) { _networkRole = null; return }
            const { data } = await supabase
                .from('network_members')
                .select('role')
                .eq('network_id', networkId)
                .eq('user_id', session.user.id)
                .single()
            _networkRole = data?.role ?? null
        }

        async function loadPlaybook(networkId) {
            const [secRes, itemRes] = await Promise.all([
                supabase.from('network_checklist_sections')
                    .select('id, title, sort_order')
                    .eq('network_id', networkId)
                    .eq('is_archived', false)
                    .order('sort_order', { ascending: true }),
                supabase.from('network_checklist_items')
                    .select('id, title, description, sort_order, section_id')
                    .eq('network_id', networkId)
                    .eq('is_archived', false)
                    .order('sort_order', { ascending: true }),
            ])
            if (secRes.error) console.error('[loadPlaybook] sections error:', secRes.error)
            if (itemRes.error) console.error('[loadPlaybook] items error:', itemRes.error)
            _playbookSections = secRes.data ?? []
            _playbookItems = itemRes.data ?? []
        }

        // ── Manage Playbook ───────────────────────────────────────────────────
        function updateManagePlaybook(networkId) {
            const section = document.getElementById('manage-playbook-section')
            if (!networkId || (_networkRole !== 'owner' && _networkRole !== 'leader')) {
                section.style.display = 'none'
                return
            }
            section.style.display = 'block'
            renderManagePlaybookList()
        }

        function renderManagePlaybookList() {
            const list = document.getElementById('manage-playbook-list')
            if (!list) return
            list.innerHTML = ''
            if (_playbookSections.length === 0) {
                const empty = document.createElement('div')
                empty.className = 'manage-playbook-empty'
                empty.textContent = window.t('mawl.no_sections')
                list.appendChild(empty)
                return
            }
            _playbookSections.forEach((sec, secIdx) => {
                const secBlock = document.createElement('div')
                secBlock.className = 'manage-section-block'
                secBlock.id = 'manage-sec-' + sec.id

                // Section header row
                const secHeader = document.createElement('div')
                secHeader.className = 'manage-section-header-row'

                const secTitleEl = document.createElement('div')
                secTitleEl.className = 'manage-section-title'
                secTitleEl.id = 'manage-sec-title-' + sec.id
                secTitleEl.textContent = sec.title
                secHeader.appendChild(secTitleEl)

                const secActions = document.createElement('div')
                secActions.className = 'manage-playbook-item-actions'
                if (secIdx > 0) {
                    const up = document.createElement('button')
                    up.className = 'manage-playbook-action-btn'; up.textContent = window.t('mawl.move_up')
                    up.onclick = () => moveSection(sec.id, 'up')
                    secActions.appendChild(up)
                }
                if (secIdx < _playbookSections.length - 1) {
                    const down = document.createElement('button')
                    down.className = 'manage-playbook-action-btn'; down.textContent = window.t('mawl.move_down')
                    down.onclick = () => moveSection(sec.id, 'down')
                    secActions.appendChild(down)
                }
                const renameBtn = document.createElement('button')
                renameBtn.className = 'manage-playbook-action-btn'; renameBtn.textContent = window.t('mawl.rename')
                renameBtn.onclick = () => showRenameSection(sec.id, sec.title)
                secActions.appendChild(renameBtn)
                const archSecBtn = document.createElement('button')
                archSecBtn.className = 'manage-playbook-action-btn manage-playbook-archive-btn'; archSecBtn.textContent = window.t('mawl.archive')
                archSecBtn.onclick = () => archiveSection(sec.id)
                secActions.appendChild(archSecBtn)
                secHeader.appendChild(secActions)
                secBlock.appendChild(secHeader)

                // Rename inline form (hidden)
                const renameForm = document.createElement('div')
                renameForm.className = 'add-playbook-form'
                renameForm.id = 'rename-sec-form-' + sec.id
                renameForm.style.display = 'none'
                const renameInput = document.createElement('input')
                renameInput.type = 'text'
                renameInput.className = 'playbook-item-input'
                renameInput.id = 'rename-sec-input-' + sec.id
                renameInput.maxLength = 200
                renameInput.addEventListener('keydown', e => {
                    if (e.key === 'Enter') submitRenameSection(sec.id)
                    if (e.key === 'Escape') hideRenameSection(sec.id)
                })
                const renameBtnRow = document.createElement('div')
                renameBtnRow.className = 'playbook-item-form-actions'
                const renameSaveBtn = document.createElement('button')
                renameSaveBtn.type = 'button'
                renameSaveBtn.className = 'create-network-submit'
                renameSaveBtn.textContent = window.t('mawl.save')
                renameSaveBtn.addEventListener('click', () => submitRenameSection(sec.id))
                const renameCancelBtn = document.createElement('button')
                renameCancelBtn.type = 'button'
                renameCancelBtn.className = 'create-network-cancel'
                renameCancelBtn.textContent = window.t('mawl.cancel')
                renameCancelBtn.addEventListener('click', () => hideRenameSection(sec.id))
                renameBtnRow.appendChild(renameSaveBtn)
                renameBtnRow.appendChild(renameCancelBtn)
                renameForm.appendChild(renameInput)
                renameForm.appendChild(renameBtnRow)
                secBlock.appendChild(renameForm)

                // Items under this section
                const itemsOfSec = _playbookItems.filter(i => i.section_id === sec.id)
                const itemList = document.createElement('div')
                itemList.className = 'manage-section-items'
                itemsOfSec.forEach((item, itemIdx) => {
                    const itemRow = document.createElement('div')
                    itemRow.className = 'manage-playbook-item-row'
                    const titleEl = document.createElement('div')
                    titleEl.className = 'manage-playbook-item-title'
                    titleEl.textContent = item.title
                    itemRow.appendChild(titleEl)
                    const acts = document.createElement('div')
                    acts.className = 'manage-playbook-item-actions'
                    if (itemIdx > 0) {
                        const up = document.createElement('button')
                        up.className = 'manage-playbook-action-btn'; up.textContent = window.t('mawl.move_up')
                        up.onclick = () => movePlaybookItem(item.id, 'up', sec.id)
                        acts.appendChild(up)
                    }
                    if (itemIdx < itemsOfSec.length - 1) {
                        const down = document.createElement('button')
                        down.className = 'manage-playbook-action-btn'; down.textContent = window.t('mawl.move_down')
                        down.onclick = () => movePlaybookItem(item.id, 'down', sec.id)
                        acts.appendChild(down)
                    }
                    const archBtn = document.createElement('button')
                    archBtn.className = 'manage-playbook-action-btn manage-playbook-archive-btn'; archBtn.textContent = window.t('mawl.archive')
                    archBtn.onclick = () => archivePlaybookItem(item.id)
                    acts.appendChild(archBtn)
                    itemRow.appendChild(acts)
                    itemList.appendChild(itemRow)
                })
                secBlock.appendChild(itemList)

                // Add item form for this section
                const addItemBtn = document.createElement('button')
                addItemBtn.className = 'add-section-item-btn'
                addItemBtn.textContent = window.t('mawl.add_item')
                addItemBtn.onclick = () => showAddItemToSection(sec.id)
                secBlock.appendChild(addItemBtn)

                const addItemForm = document.createElement('div')
                addItemForm.className = 'add-playbook-form'
                addItemForm.id = 'add-item-form-' + sec.id
                addItemForm.style.display = 'none'
                const addItemInput = document.createElement('input')
                addItemInput.type = 'text'
                addItemInput.className = 'playbook-item-input'
                addItemInput.id = 'add-item-input-' + sec.id
                addItemInput.placeholder = window.t('mawl.item_placeholder')
                addItemInput.maxLength = 200
                addItemInput.addEventListener('keydown', e => {
                    if (e.key === 'Enter') submitAddItemToSection(sec.id)
                    if (e.key === 'Escape') cancelAddItemToSection(sec.id)
                })
                const addItemBtnRow = document.createElement('div')
                addItemBtnRow.className = 'playbook-item-form-actions'
                const addItemSaveBtn = document.createElement('button')
                addItemSaveBtn.type = 'button'
                addItemSaveBtn.className = 'create-network-submit'
                addItemSaveBtn.textContent = window.t('mawl.add')
                addItemSaveBtn.addEventListener('click', () => submitAddItemToSection(sec.id))
                const addItemCancelBtn = document.createElement('button')
                addItemCancelBtn.type = 'button'
                addItemCancelBtn.className = 'create-network-cancel'
                addItemCancelBtn.textContent = window.t('mawl.cancel')
                addItemCancelBtn.addEventListener('click', () => cancelAddItemToSection(sec.id))
                addItemBtnRow.appendChild(addItemSaveBtn)
                addItemBtnRow.appendChild(addItemCancelBtn)
                addItemForm.appendChild(addItemInput)
                addItemForm.appendChild(addItemBtnRow)
                secBlock.appendChild(addItemForm)

                list.appendChild(secBlock)
            })

            // Orphaned items (section_id == null) — only render if they exist
            const orphaned = _playbookItems.filter(i => i.section_id == null)
            if (orphaned.length > 0) {
                const otherHdr = document.createElement('div')
                otherHdr.className = 'manage-section-title playbook-section-header-other'
                otherHdr.textContent = window.t('mawl.other_section')
                list.appendChild(otherHdr)
                const otherList = document.createElement('div')
                otherList.className = 'manage-section-items'
                orphaned.forEach(item => {
                    const itemRow = document.createElement('div')
                    itemRow.className = 'manage-playbook-item-row'
                    const titleEl = document.createElement('div')
                    titleEl.className = 'manage-playbook-item-title'
                    titleEl.textContent = item.title
                    itemRow.appendChild(titleEl)
                    const acts = document.createElement('div')
                    acts.className = 'manage-playbook-item-actions'
                    const archBtn = document.createElement('button')
                    archBtn.className = 'manage-playbook-action-btn manage-playbook-archive-btn'
                    archBtn.textContent = window.t('mawl.archive')
                    archBtn.onclick = () => archivePlaybookItem(item.id)
                    acts.appendChild(archBtn)
                    itemRow.appendChild(acts)
                    otherList.appendChild(itemRow)
                })
                list.appendChild(otherList)
            }
        }

        // ── Section management ────────────────────────────────────────────────
        window.showAddSection = function () {
            document.getElementById('add-section-form').style.display = 'block'
            document.getElementById('add-section-input').focus()
        }
        window.cancelAddSection = function () {
            document.getElementById('add-section-form').style.display = 'none'
            document.getElementById('add-section-input').value = ''
        }
        window.submitAddSection = async function () {
            const input = document.getElementById('add-section-input')
            const title = input.value.trim()
            if (!title) { input.focus(); return }
            const networkId = document.getElementById('network-select').value
            if (!networkId) return
            const { data: { session } } = await supabase.auth.getSession()
            const maxSort = _playbookSections.length > 0
                ? Math.max(..._playbookSections.map(s => s.sort_order)) + 1 : 0
            const { error } = await supabase.from('network_checklist_sections')
                .insert({ network_id: networkId, title, sort_order: maxSort, created_by: session.user.id })
            if (error) { console.error('[submitAddSection] insert error:', error); showNotification(window.t('mawl.could_not_add_section')); return }
            input.value = ''
            document.getElementById('add-section-form').style.display = 'none'
            await loadPlaybook(networkId)
            renderManagePlaybookList()
        }
        window.showRenameSection = function (secId, currentTitle) {
            document.getElementById('rename-sec-form-' + secId).style.display = 'block'
            const inp = document.getElementById('rename-sec-input-' + secId)
            inp.value = currentTitle
            inp.focus()
        }
        window.hideRenameSection = function (secId) {
            document.getElementById('rename-sec-form-' + secId).style.display = 'none'
        }
        window.submitRenameSection = async function (secId) {
            const inp = document.getElementById('rename-sec-input-' + secId)
            const title = inp.value.trim()
            if (!title) { inp.focus(); return }
            const networkId = document.getElementById('network-select').value
            const { error } = await supabase.from('network_checklist_sections')
                .update({ title }).eq('id', secId)
            if (error) { console.error('[submitRenameSection] update error:', error); showNotification(window.t('mawl.could_not_rename_section')); return }
            await loadPlaybook(networkId)
            renderManagePlaybookList()
        }
        async function moveSection(secId, dir) {
            const networkId = document.getElementById('network-select').value
            const idx = _playbookSections.findIndex(s => s.id === secId)
            if (idx < 0) return
            const swapIdx = dir === 'up' ? idx - 1 : idx + 1
            if (swapIdx < 0 || swapIdx >= _playbookSections.length) return
            const a = _playbookSections[idx], b = _playbookSections[swapIdx]
            const [eA, eB] = await Promise.all([
                supabase.from('network_checklist_sections').update({ sort_order: b.sort_order }).eq('id', a.id).then(r => r.error),
                supabase.from('network_checklist_sections').update({ sort_order: a.sort_order }).eq('id', b.id).then(r => r.error),
            ])
            if (eA || eB) { console.error('[moveSection] reorder error:', eA ?? eB); showNotification(window.t('mawl.could_not_reorder_sections')); return }
            await loadPlaybook(networkId)
            renderManagePlaybookList()
        }
        async function archiveSection(secId) {
            const networkId = document.getElementById('network-select').value
            const { error } = await supabase.from('network_checklist_sections')
                .update({ is_archived: true }).eq('id', secId)
            if (error) { console.error('[archiveSection] update error:', error); showNotification(window.t('mawl.could_not_archive_section')); return }
            await loadPlaybook(networkId)
            renderManagePlaybookList()
        }

        // ── Item management (per-section) ─────────────────────────────────────
        window.showAddItemToSection = function (secId) {
            document.getElementById('add-item-form-' + secId).style.display = 'block'
            document.getElementById('add-item-input-' + secId).focus()
        }
        window.cancelAddItemToSection = function (secId) {
            document.getElementById('add-item-form-' + secId).style.display = 'none'
            document.getElementById('add-item-input-' + secId).value = ''
        }
        window.submitAddItemToSection = async function (secId) {
            const input = document.getElementById('add-item-input-' + secId)
            const title = input.value.trim()
            if (!title) { input.focus(); return }
            const networkId = document.getElementById('network-select').value
            if (!networkId) return
            const { data: { session } } = await supabase.auth.getSession()
            const itemsInSec = _playbookItems.filter(i => i.section_id === secId)
            const maxSort = itemsInSec.length > 0
                ? Math.max(...itemsInSec.map(i => i.sort_order)) + 1 : 0
            const payload = { network_id: networkId, section_id: secId, title, description: null, sort_order: maxSort, created_by: session.user.id }
            const { data, error } = await supabase.from('network_checklist_items').insert(payload).select()
            if (error) {
                const isRls = error.code === '42501' || String(error.message ?? '').toLowerCase().includes('policy')
                console.error('[submitAddItemToSection] insert error' + (isRls ? ' — RLS policy violation' : '') + ':', error)
                showNotification(window.t('mawl.could_not_add_item'))
                return
            }
            await loadPlaybook(networkId)
            renderManagePlaybookList()
            if (_activeChecklistId) await renderPlaybookGrid(_activeChecklistId)
            input.value = ''
            const addedForm = document.getElementById('add-item-form-' + secId)
            if (addedForm) addedForm.style.display = 'none'
        }

        async function movePlaybookItem(itemId, dir, sectionId) {
            const networkId = document.getElementById('network-select').value
            const scoped = sectionId ? _playbookItems.filter(i => i.section_id === sectionId) : _playbookItems
            const idx = scoped.findIndex(i => i.id === itemId)
            if (idx < 0) return
            const swapIdx = dir === 'up' ? idx - 1 : idx + 1
            if (swapIdx < 0 || swapIdx >= scoped.length) return
            const a = scoped[idx]
            const b = scoped[swapIdx]
            const [errA, errB] = await Promise.all([
                supabase.from('network_checklist_items').update({ sort_order: b.sort_order }).eq('id', a.id).then(r => r.error),
                supabase.from('network_checklist_items').update({ sort_order: a.sort_order }).eq('id', b.id).then(r => r.error),
            ])
            if (errA || errB) { console.error('[movePlaybookItem] reorder error:', errA ?? errB); showNotification(window.t('mawl.could_not_reorder')); return }
            await loadPlaybook(networkId)
            renderManagePlaybookList()
        }

        async function archivePlaybookItem(itemId) {
            const networkId = document.getElementById('network-select').value
            const { error } = await supabase
                .from('network_checklist_items')
                .update({ is_archived: true })
                .eq('id', itemId)
            if (error) { console.error('[archivePlaybookItem] update error:', error); showNotification(window.t('mawl.could_not_archive_item')); return }
            await loadPlaybook(networkId)
            renderManagePlaybookList()
        }

        // ── Checklist progress grid (playbook-based) ──────────────────────────
        async function renderPlaybookGrid(checklistId) {
            _activeChecklistId = checklistId
            const myGen = ++_renderGeneration
            const section = document.getElementById('mawl-grid-section')
            if (!checklistId) { section.style.display = 'none'; section.innerHTML = ''; return }
            section.style.display = 'block'
            section.innerHTML = `<div class="mawl-grid-loading">${window.t('mawl.loading_progress')}</div>`

            const { data, error } = await supabase
                .from('checklist_item_progress')
                .select('item_id, mawl_stage')
                .eq('checklist_id', checklistId)

            // If the user selected a different person while this fetch was in flight, discard.
            if (myGen !== _renderGeneration) return

            _playbookProgress = {}
            if (!error && data) {
                data.forEach(r => {
                    _playbookProgress[r.item_id] = { mawl_stage: r.mawl_stage }
                })
            }

            section.innerHTML = ''

            if (_playbookSections.length === 0 && _playbookItems.length === 0) {
                const emptyEl = document.createElement('div')
                emptyEl.className = 'mawl-grid-loading'
                emptyEl.textContent = (_networkRole === 'owner' || _networkRole === 'leader')
                    ? window.t('mawl.no_playbook_owner')
                    : window.t('mawl.no_playbook_items')
                section.appendChild(emptyEl)
            } else {
                _playbookSections.forEach(sec => {
                    const itemsInSec = _playbookItems.filter(i => i.section_id === sec.id)
                    if (itemsInSec.length === 0) return
                    const hdr = document.createElement('div')
                    hdr.className = 'playbook-section-header'
                    hdr.textContent = sec.title
                    section.appendChild(hdr)
                    itemsInSec.forEach(item => section.appendChild(buildPlaybookItemRow(item)))
                })
                // Items with no section (shouldn't normally exist, but be safe)
                const unsectioned = _playbookItems.filter(i => i.section_id == null)
                if (unsectioned.length > 0) {
                    const hdr = document.createElement('div')
                    hdr.className = 'playbook-section-header playbook-section-header-other'
                    hdr.textContent = window.t('mawl.other_section')
                    section.appendChild(hdr)
                    unsectioned.forEach(item => section.appendChild(buildPlaybookItemRow(item)))
                }
            }

            await renderCollaboratorPanel(checklistId, section)
        }

        const MAWL_STAGES = ['M', 'A', 'W', 'L']

        function buildPlaybookItemRow(item) {
            const prog = _playbookProgress[item.id] ?? {}
            const highestIdx = MAWL_STAGES.indexOf(prog.mawl_stage ?? '')

            const row = document.createElement('div')
            row.className = 'mawl-item-row' + (highestIdx === 3 ? ' pb-completed' : '')
            row.id = 'mawl-row-' + item.id

            const labelEl = document.createElement('div')
            labelEl.className = 'mawl-item-label'
            labelEl.textContent = item.title
            row.appendChild(labelEl)

            const stageBtns = document.createElement('div')
            stageBtns.className = 'mawl-stage-btns'
            MAWL_STAGES.forEach((stage, idx) => {
                const filled = idx <= highestIdx
                const btn = document.createElement('button')
                btn.className = 'mawl-stage-btn' + (filled ? ' done' : '')
                btn.textContent = stage
                btn.setAttribute('aria-label', stage + (filled ? ' (reached)' : ''))
                btn.onclick = () => setMawlStage(item.id, stage)
                stageBtns.appendChild(btn)
            })
            row.appendChild(stageBtns)

            return row
        }

        async function setMawlStage(itemId, stage) {
            if (!_activeChecklistId) return
            const current = _playbookProgress[itemId] ?? {}
            const curIdx     = MAWL_STAGES.indexOf(current.mawl_stage ?? '')
            const clickedIdx = MAWL_STAGES.indexOf(stage)
            // clicking the current highest steps back one level; M clears to null
            const newStage = clickedIdx === curIdx
                ? (curIdx > 0 ? MAWL_STAGES[curIdx - 1] : null)
                : MAWL_STAGES[clickedIdx]
            const { error } = await supabase
                .from('checklist_item_progress')
                .upsert({ checklist_id: _activeChecklistId, item_id: itemId, mawl_stage: newStage },
                         { onConflict: 'checklist_id,item_id' })
            if (error) { console.error('[setMawlStage] error:', error); showNotification(window.t('mawl.could_not_save')); return }
            _playbookProgress[itemId] = { mawl_stage: newStage }
            refreshPlaybookItemRow(itemId)
        }

        function refreshPlaybookItemRow(itemId) {
            const item = _playbookItems.find(i => i.id === itemId)
            if (!item) return
            const existing = document.getElementById('mawl-row-' + item.id)
            if (existing) existing.replaceWith(buildPlaybookItemRow(item))
        }

        // ── Collaborator panel ────────────────────────────────────────────────

        async function renderCollaboratorPanel(checklistId, container) {
            const { data: { session } } = await supabase.auth.getSession()
            const isCreator = !!(_activeChecklistCreatedBy && session?.user?.id === _activeChecklistCreatedBy)
            // Any user who can access the checklist (owner, collaborator, or network member
            // who reached this panel) may invite additional collaborators.
            // isCreator is still computed for the self-add guard in submitAddCollaborator.
            const panel = document.createElement('div')
            panel.className = 'collab-panel'

            // Collapsed toggle row — click to expand/collapse the body
            const toggleRow = document.createElement('div')
            toggleRow.className = 'collab-toggle-row'
            const toggleLabel = document.createElement('span')
            toggleLabel.className = 'collab-label'
            toggleLabel.id = 'collab-toggle-label'
            toggleLabel.textContent = window.t('mawl.collaborators')
            const toggleChevron = document.createElement('span')
            toggleChevron.className = 'collab-toggle-chevron'
            toggleChevron.textContent = '▸'
            toggleRow.appendChild(toggleLabel)
            toggleRow.appendChild(toggleChevron)
            panel.appendChild(toggleRow)

            // Collapsible body — hidden by default
            const body = document.createElement('div')
            body.className = 'collab-body'
            body.style.display = 'none'

            toggleRow.onclick = () => {
                const open = body.style.display !== 'none'
                body.style.display = open ? 'none' : 'block'
                toggleChevron.textContent = open ? '▸' : '▾'
            }

            // Show the add form to any user with checklist access (not just the creator).
            const form = document.createElement('div')
            form.className = 'collab-add-form'
            form.innerHTML = `
                <input type="email" id="collab-email-input" class="collab-email-input"
                       placeholder="${window.t('mawl.collaborator_email')}" maxlength="200"
                       onkeydown="if(event.key==='Enter') submitAddCollaborator()">
                <div class="collab-add-actions">
                    <button type="button" class="collab-add-btn" id="collab-add-btn" onclick="submitAddCollaborator()">${window.t('mawl.add_leader')}</button>
                </div>`
            body.appendChild(form)

            const list = document.createElement('div')
            list.className = 'collab-list'
            list.id = 'collab-list'
            body.appendChild(list)
            panel.appendChild(body)

            container.appendChild(panel)
            await loadCollaborators(checklistId)
        }

        async function loadCollaborators(checklistId) {
            const list = document.getElementById('collab-list')
            if (!list) return

            list.innerHTML = `<div class="collab-loading">${window.t('mawl.loading')}</div>`

            const { data, error } = await supabase
                .from('checklist_collaborators')
                .select('user_id, collaborator_email')
                .eq('checklist_id', checklistId)
                .order('created_at')

            // Discard if a different checklist became active while this fetch was in flight.
            if (_activeChecklistId !== checklistId) return

            // Update toggle label with collaborator count (cosmetic, no logic change)
            const count = !error && data ? data.length : 0
            const toggleLabel = document.getElementById('collab-toggle-label')
            if (toggleLabel) toggleLabel.textContent = count > 0 ? window.t('mawl.collaborators_count', { count }) : window.t('mawl.collaborators')

            if (error) {
                console.error('[loadCollaborators] error:', JSON.stringify(error))
                list.innerHTML = `<div class="collab-empty">${window.t('mawl.collaborator_error')}</div>`
                return
            }

            if (!data || data.length === 0) {
                list.innerHTML = `<div class="collab-empty">${window.t('mawl.no_collaborators')}</div>`
                return
            }

            list.innerHTML = ''
            data.forEach(c => {
                const item = document.createElement('div')
                item.className = 'collab-item'
                item.textContent = c.collaborator_email
                list.appendChild(item)
            })
        }

        window.submitAddCollaborator = async function () {
            const input = document.getElementById('collab-email-input')
            const email = (input?.value ?? '').trim().toLowerCase()

            if (!email) {
                input?.focus()
                return
            }
            if (!_activeChecklistId) {
                showNotification(window.t('mawl.select_checklist'))
                return
            }

            const btn = document.getElementById('collab-add-btn')
            if (!btn) return
            btn.disabled = true
            btn.textContent = window.t('mawl.adding')

            const { data: { session } } = await supabase.auth.getSession()

            const { data: userId, error: lookupError } = await supabase
                .rpc('get_leader_id_by_email', { lookup_email: email })

            if (lookupError) {
                console.error('[submitAddCollaborator] RPC error (full):', lookupError)
                showNotification('Lookup failed — see console. The RPC may not exist yet.')
                btn.disabled = false
                btn.textContent = window.t('mawl.add_leader')
                return
            }
            if (!userId) {
                showNotification(window.t('mawl.no_leader_found'))
                btn.disabled = false
                btn.textContent = window.t('mawl.add_leader')
                return
            }
            if (userId === session.user.id) {
                showNotification(window.t('mawl.own_email_error'))
                btn.disabled = false
                btn.textContent = window.t('mawl.add_leader')
                return
            }

            const payload = {
                checklist_id: _activeChecklistId,
                user_id: userId,
                collaborator_email: email,
                added_by: session.user.id,
            }
            const { error: insertError } = await supabase
                .from('checklist_collaborators')
                .insert(payload)

            btn.disabled = false
            btn.textContent = window.t('mawl.add_leader')

            if (insertError) {
                console.error('[submitAddCollaborator] insert error (full):', insertError)
                if (insertError.code === '23505') showNotification(window.t('mawl.already_collaborator'))
                else showNotification('Insert failed — see console: ' + (insertError.message ?? ''))
                return
            }

            // Post-insert verification: check RLS health after adding collaborator
            const { error: e1 } = await supabase
                .from('checklist_collaborators')
                .select('user_id, collaborator_email')
                .eq('checklist_id', _activeChecklistId)
                .eq('user_id', userId)
                .single()
            if (e1) console.error('      ↳ creator cannot read the row just inserted — SELECT RLS on checklist_collaborators is broken')

            const { error: e2 } = await supabase
                .from('mawl_checklists')
                .select('id, coached_name')
                .eq('id', _activeChecklistId)
                .single()
            if (e2) console.error('      ↳ mawl_checklists SELECT is broken — SELECT policy likely references checklist_collaborators before it existed')

            const { error: e3 } = await supabase
                .from('mawl_progress')
                .select('item_key')
                .eq('checklist_id', _activeChecklistId)
                .limit(1)
            if (e3) console.error('      ↳ mawl_progress SELECT is broken — SELECT policy does not cover this checklist')

            input.value = ''
            await loadCollaborators(_activeChecklistId)
        }

        window.showCreateChecklist = function () {
            document.getElementById('create-checklist-form').style.display = 'block'
            document.getElementById('create-checklist-input').focus()
        }

        window.cancelCreateChecklist = function () {
            document.getElementById('create-checklist-form').style.display = 'none'
            document.getElementById('create-checklist-input').value = ''
        }

        window.submitCreateChecklist = async function () {
            const input = document.getElementById('create-checklist-input')
            const coached_name = input.value.trim()
            if (!coached_name) {
                input.focus()
                return
            }

            const networkId = document.getElementById('network-select').value
            if (!networkId) return

            const btn = document.getElementById('create-checklist-submit')
            btn.disabled = true
            btn.textContent = window.t('mawl.adding')

            const { data: { session } } = await supabase.auth.getSession()

            const payload = { network_id: networkId, coached_name, created_by: session.user.id }

            // Insert without .select() — avoids the RLS RETURNING race.
            // PostgREST evaluates the RETURNING clause through the SELECT policy
            // before the row is fully visible to it, so .select('id').single()
            // always returns an error even when the insert succeeded.
            // Same fix already applied to submitCreateNetwork.
            const { error: insertError } = await supabase
                .from('mawl_checklists')
                .insert(payload)

            btn.disabled = false
            btn.textContent = window.t('mawl.add')

            if (insertError) {
                console.error('[submitCreateChecklist] insert failed:', insertError)
                showNotification(window.t('mawl.could_not_add_checklist'))
                return
            }

            input.value = ''
            document.getElementById('create-checklist-form').style.display = 'none'

            // Separate follow-up query — insert is committed, SELECT policy passes now.
            const { data: newest, error: selectError } = await supabase
                .from('mawl_checklists')
                .select('id')
                .eq('network_id', networkId)
                .eq('created_by', session.user.id)
                .order('created_at', { ascending: false })
                .limit(1)
                .single()

            if (selectError) console.warn('[submitCreateChecklist] auto-select id unavailable:', selectError)

            await loadChecklists(networkId, newest?.id ?? null)
        }

        // Load networks on initial session. getSession() handles the startup case.
        // onAuthStateChange is filtered to avoid the double-fire of INITIAL_SESSION
        // (which fires at the same time as getSession resolves) and TOKEN_REFRESHED
        // (session token rotation — no need to reload the full UI).
        supabase.auth.getSession().then(({ data: { session } }) => {
            if (session?.user) loadNetworks()
        })
        supabase.auth.onAuthStateChange((_event, session) => {
            if (!session?.user) return
            if (_event === 'INITIAL_SESSION' || _event === 'TOKEN_REFRESHED') return
            loadNetworks()
        })

        // ── Share checklist ───────────────────────────────────────────────────
        window.shareChecklist = async function () {
            const url  = window.location.origin + window.location.pathname
            const text = `Here's the MAWL Checklist I'm using to track ministry rhythms. You can check it out here: ${url}`

            // 1. Native Web Share API — best on mobile (iOS/Android)
            if (navigator.share) {
                try {
                    await navigator.share({ title: 'MAWL Checklist', text, url })
                    return
                } catch (err) {
                    if (err.name === 'AbortError') return  // user dismissed sheet — do nothing
                    // Other errors (e.g. DataError on some browsers) fall through
                }
            }

            // 2. SMS fallback — pre-fills native Messages app on mobile
            if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
                window.open(`sms:?body=${encodeURIComponent(text)}`, '_self')
                return
            }

            // 3. Clipboard fallback — desktop
            try {
                await navigator.clipboard.writeText(text)
                showNotification('Link copied to clipboard!')
            } catch {
                // Legacy execCommand fallback for older browsers
                const ta = document.createElement('textarea')
                ta.value = text
                ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px;opacity:0;'
                document.body.appendChild(ta)
                ta.select()
                try { document.execCommand('copy') } catch {}
                document.body.removeChild(ta)
                showNotification('Link copied to clipboard!')
            }
        }

        initLeaderPage()
    </script>

        .add-checklist-btn { padding: 0; border: none; background: none; font-size: 12px; font-weight: 600; cursor: pointer; color: #8e8e93; font-family: inherit; text-decoration: underline; text-underline-offset: 2px; flex-shrink: 0; }
        .add-checklist-btn:hover { color: #3a3a3c; }
        .checklist-loading { padding: 8px 0; text-align: center; color: #8e8e93; font-size: 13px; }
        .checklist-empty { padding: 8px 0; color: #8e8e93; font-size: 13px; }
        .create-checklist-form { margin-top: 12px; padding: 14px; background: #f2f2f7; border-radius: 12px; }
        .create-checklist-input { width: 100%; padding: 11px 14px; border: 1px solid #c6c6c8; border-radius: 10px; font-size: 16px; font-family: inherit; background: #fff; outline: none; margin-bottom: 10px; }
        .create-checklist-input:focus { border-color: #00D084; }
        .create-checklist-actions { display: flex; gap: 8px; }
        .create-checklist-submit { flex: 1; padding: 10px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; background: #00D084; color: #fff; font-family: inherit; }
        .create-checklist-submit:disabled { opacity: 0.6; cursor: default; }
        .create-checklist-cancel { flex: 1; padding: 10px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; background: #e5e5ea; color: #3a3a3c; font-family: inherit; }

        /* MAWL progress grid */
        .mawl-grid-section { border-top: 0.5px solid #e5e5ea; padding-bottom: 40px; }
        .mawl-grid-loading { padding: 24px 16px; text-align: center; color: #8e8e93; font-size: 15px; }
        /* Column header (Item | M  A  W  L) */
        .mawl-col-header { display: flex; align-items: center; padding: 7px 16px; background: #f2f2f7; border-bottom: 0.5px solid #c6c6c8; }
        .mawl-col-item-label { flex: 1; font-size: 11px; font-weight: 700; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; }
        .mawl-col-btns { display: flex; gap: 6px; flex-shrink: 0; }
        .mawl-col-btn-label { width: 36px; text-align: center; font-size: 11px; font-weight: 700; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; }
        /* Category and items */
        .mawl-category { }
        .mawl-category-header { font-size: 11px; font-weight: 700; color: #3a3a3c; text-transform: uppercase; letter-spacing: 0.5px; padding: 7px 16px; background: #f2f2f7; border-top: 0.5px solid #c6c6c8; border-bottom: 0.5px solid #c6c6c8; }
        .mawl-item-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 16px; border-bottom: 0.5px solid #f2f2f7; }
        .mawl-item-label { font-size: 14px; color: #1c1c1e; flex: 1; padding-right: 12px; line-height: 1.3; }
        .mawl-stage-btns { display: flex; gap: 5px; flex-shrink: 0; }
        .mawl-stage-btn { width: 34px; height: 34px; border: none; border-radius: 7px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; background: #e5e5ea; color: #aeaeb2; transition: background 0.1s; }
        .mawl-stage-btn.done { background: #00D084; color: #fff; }

        /* Access denied */
        .access-denied { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; padding: 40px 24px; text-align: center; }
        .access-denied-msg { font-size: 17px; font-weight: 600; color: #3a3a3c; margin-bottom: 6px; }
        .access-denied-sub { font-size: 14px; color: #8e8e93; margin-bottom: 28px; }
        .access-denied-btn { display: inline-block; background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-weight: 700; font-size: 15px; padding: 11px 28px; border-radius: 50px; text-decoration: none; }

        /* Notification */
        .notification { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 12px 20px; border-radius: 8px; font-size: 15px; font-weight: 500; z-index: 1000; opacity: 0; animation: notificationSlide 3s ease; }
        @keyframes notificationSlide { 0% { opacity:0; transform:translateX(-50%) translateY(-20px); } 10% { opacity:1; transform:translateX(-50%) translateY(0); } 90% { opacity:1; transform:translateX(-50%) translateY(0); } 100% { opacity:0; transform:translateX(-50%) translateY(-20px); } }

        /* Collaborator panel — demoted secondary section */
        .collab-panel { padding: 0 16px 24px; margin-top: 24px; border-top: 0.5px solid #f2f2f7; }
        .collab-header-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0 8px; }
        .collab-label { font-size: 11px; font-weight: 600; color: #aeaeb2; text-transform: uppercase; letter-spacing: 0.5px; }
        .collab-add-form { margin-bottom: 10px; }
        .collab-email-input { width: 100%; padding: 9px 12px; border: 1px solid #c6c6c8; border-radius: 8px; font-size: 14px; font-family: inherit; background: #fff; outline: none; margin-bottom: 6px; }
        .collab-email-input:focus { border-color: #00D084; }
        .collab-add-actions { display: flex; }
        .collab-add-btn { padding: 7px 16px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; background: #e5e5ea; color: #3a3a3c; font-family: inherit; }
        .collab-add-btn:hover { background: #d1d1d6; }
        .collab-add-btn:disabled { opacity: 0.6; cursor: default; }
        .collab-list { display: flex; flex-direction: column; gap: 4px; }
        .collab-item { padding: 5px 0; font-size: 13px; color: #8e8e93; border-bottom: 0.5px solid #f2f2f7; }
        .collab-empty { font-size: 13px; color: #c7c7cc; padding: 4px 0; }
        .collab-loading { font-size: 13px; color: #c7c7cc; padding: 4px 0; }
        /* Collapsible collaborator toggle */
        .collab-toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0 8px; cursor: pointer; user-select: none; }
        .collab-toggle-row:hover .collab-label { color: #8e8e93; }
        .collab-toggle-chevron { font-size: 10px; color: #c7c7cc; flex-shrink: 0; padding-left: 6px; }
        /* "Other" fallback section label — visually subdued */
        .playbook-section-header-other { color: #c7c7cc; font-weight: 600; font-size: 10px; letter-spacing: 0.3px; }

        /* Playbook progress (checkbox style) */
        .playbook-check-btn { width: 28px; height: 28px; border: 2px solid #c6c6c8; border-radius: 6px; background: #fff; cursor: pointer; flex-shrink: 0; margin-right: 12px; font-size: 16px; font-weight: 700; color: #fff; display: flex; align-items: center; justify-content: center; }
        .playbook-check-btn.done { background: #00D084; border-color: #00D084; }
        .playbook-check-btn.done::after { content: '✓'; }
        .pb-completed .mawl-item-label { text-decoration: line-through; color: #8e8e93; }

        /* Manage Playbook section */
        /* Checklist view section headers */
        .playbook-section-header { padding: 16px 16px 4px; font-size: 11px; font-weight: 700; color: #aeaeb2; text-transform: uppercase; letter-spacing: 0.6px; background: transparent; border-top: none; margin-top: 0; }
        .playbook-section-header:first-child { padding-top: 12px; }

        /* Manage Playbook section */
        .manage-playbook-section { padding: 0 16px 24px; border-top: 0.5px solid #c6c6c8; }
        .manage-playbook-header-row { display: flex; align-items: center; justify-content: space-between; padding: 20px 0 10px; }
        .manage-playbook-label { font-size: 13px; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; }
        .add-playbook-item-btn { padding: 6px 14px; border: none; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; background: #3a3a3c; color: #fff; font-family: inherit; }
        .add-playbook-form { margin-bottom: 12px; padding: 14px; background: #f2f2f7; border-radius: 12px; }
        .playbook-item-input { width: 100%; padding: 11px 14px; border: 1px solid #c6c6c8; border-radius: 10px; font-size: 16px; font-family: inherit; background: #fff; outline: none; margin-bottom: 10px; }
        .playbook-item-input:focus { border-color: #00D084; }
        .playbook-item-form-actions { display: flex; gap: 8px; }
        .manage-playbook-item-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 0.5px solid #f2f2f7; }
        .manage-playbook-item-title { font-size: 15px; color: #000; flex: 1; padding-right: 8px; }
        .manage-playbook-item-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .manage-playbook-action-btn { padding: 5px 10px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; background: #e5e5ea; color: #3a3a3c; font-family: inherit; }
        .manage-playbook-archive-btn { background: #ffeaea; color: #c00; }
        .manage-playbook-empty { font-size: 14px; color: #8e8e93; padding: 8px 0; }
        .manage-section-block { margin-bottom: 16px; border: 1px solid #e5e5ea; border-radius: 10px; overflow: hidden; }
        .manage-section-header-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: #f2f2f7; border-bottom: 0.5px solid #e5e5ea; }
        .manage-section-title { font-size: 14px; font-weight: 700; color: #3a3a3c; flex: 1; }
        .manage-section-items { padding: 0 12px; }
        .manage-section-items .manage-playbook-item-row { padding: 8px 0; }
        .add-section-item-btn { display: block; width: 100%; padding: 8px 12px; border: none; background: none; text-align: left; font-size: 13px; color: #00D084; font-weight: 600; cursor: pointer; font-family: inherit; border-top: 0.5px solid #f2f2f7; }
        .add-section-item-btn:hover { background: #f9f9fb; }
        .manage-section-items .add-playbook-form { padding: 10px 0 4px; background: none; border-radius: 0; }

        /* Network header bar */
        .network-header-bar { padding: 6px 16px; background: #f2f2f7; border-bottom: 0.5px solid #c6c6c8; }
        .network-display-row { display: flex; align-items: center; gap: 6px; min-height: 30px; }
        .network-display-label { font-size: 11px; font-weight: 600; color: #aeaeb2; text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0; }
        .network-display-name { font-size: 14px; font-weight: 600; color: #3a3a3c; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .network-display-actions { display: flex; gap: 10px; flex-shrink: 0; }
        .network-action-btn { padding: 0; border: none; background: none; font-size: 12px; font-weight: 600; cursor: pointer; color: #8e8e93; font-family: inherit; text-decoration: underline; text-underline-offset: 2px; }
        .network-action-btn:hover { color: #3a3a3c; }
        .network-action-add { color: #8e8e93; }
        .network-action-add:hover { color: #3a3a3c; }
        #network-picker-panel { padding-top: 8px; }

        /* Tabs */
        .tab-bar { display: flex; border-bottom: 0.5px solid #c6c6c8; background: #fff; }
        .tab-btn { flex: 1; padding: 10px 12px; border: none; background: none; font-size: 15px; font-weight: 600; color: #8e8e93; cursor: pointer; font-family: inherit; border-bottom: 2px solid transparent; margin-bottom: -0.5px; transition: color 0.15s; }
        .tab-btn.active { color: #00D084; border-bottom-color: #00D084; }
        /* Remove redundant top border when checklist-section is first child inside a tab */
        .tab-panel > .checklist-section { border-top: none; }

        @media (min-width: 768px) {
            .container { border-radius: 12px; margin: 20px auto; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
        }
    </style>
    <script src="/pwa.js" defer></script>
</head>
<body>

    <div style="display:flex; gap:10px; justify-content:center; padding:20px 16px 8px;">
        <a href="index.html" data-i18n="nav.home" style="display:inline-block; background:#000; color:#fff; font-family:-apple-system,BlinkMacSystemFont,sans-serif; font-weight:700; font-size:15px; padding:11px 22px; border-radius:50px; text-decoration:none; white-space:nowrap;">Home</a>
        <a href="leader-tools.html" data-i18n="nav.back_leader" style="display:inline-block; background:#00D084; color:#fff; font-family:-apple-system,BlinkMacSystemFont,sans-serif; font-weight:700; font-size:15px; padding:11px 22px; border-radius:50px; text-decoration:none; white-space:nowrap;">← Leader Tools</a>
    </div>

    <div id="access-denied" class="access-denied">
        <div class="access-denied-msg" data-i18n="access.restricted">Access restricted.</div>
        <div class="access-denied-sub" data-i18n="access.leader_required">Leader approval required.</div>
        <a href="index.html" class="access-denied-btn" data-i18n="access.go_home">Go to Home</a>
    </div>

    <div class="container" id="main-container">

        <div class="auth-section" id="auth-section">
            <div id="auth-form" style="display:none">
                <input type="email" id="auth-email" data-i18n-placeholder="auth.email_placeholder" placeholder="Email">
                <input type="password" id="auth-password" data-i18n-placeholder="auth.password_placeholder" placeholder="Password">
                <div class="auth-buttons">
                    <button class="auth-btn-primary" onclick="authSignUp()" data-i18n="auth.sign_up">Sign Up</button>
                    <button class="auth-btn-secondary" onclick="authLogIn()" data-i18n="auth.log_in">Log In</button>
                </div>
            </div>
            <div class="auth-status" id="auth-status" style="display:none">
                <span class="auth-status-text" id="auth-status-text" data-i18n="auth.not_signed_in">Not signed in</span>
                <button class="auth-logout-btn" onclick="authLogOut()" data-i18n="auth.log_out">Log Out</button>
            </div>
        </div>

        <!-- Network header bar (above tabs, always visible) -->
        <div class="network-header-bar" id="network-section">
            <div class="network-display-row">
                <span class="network-display-label" data-i18n="mawl.network_label">Network:</span>
                <span class="network-display-name" id="network-display-text">—</span>
                <div class="network-display-actions">
                    <button class="network-action-btn" onclick="showNetworkPicker()" data-i18n="mawl.network_change">Change</button>
                    <button class="network-action-btn network-action-add" onclick="showCreateNetwork()" data-i18n="mawl.network_add">Add</button>
                </div>
            </div>
            <!-- Picker panel: hidden until Change/Add is clicked -->
            <div id="network-picker-panel" style="display:none">
                <div class="network-loading" id="network-loading" data-i18n="mawl.loading_networks" style="display:none">Loading networks…</div>
                <select class="network-select" id="network-select" style="display:none" onchange="onNetworkChange()">
                    <option value="" data-i18n="mawl.choose_network">— Choose a network —</option>
                </select>
                <div class="create-network-form" id="create-network-form" style="display:none">
                    <input type="text" class="create-network-input" id="create-network-input"
                           data-i18n-placeholder="mawl.network_name_placeholder" placeholder="Network name" maxlength="80"
                           onkeydown="if(event.key==='Enter') submitCreateNetwork(); if(event.key==='Escape') cancelCreateNetwork()">
                    <div class="create-network-actions">
                        <button class="create-network-submit" id="create-network-submit" onclick="submitCreateNetwork()" data-i18n="mawl.create">Create</button>
                        <button type="button" class="create-network-cancel" onclick="cancelCreateNetwork()" data-i18n="mawl.cancel">Cancel</button>
                    </div>
                </div>
                <div class="network-empty" id="network-empty" style="display:none">
                    <div class="network-empty-icon">🌐</div>
                    <div class="network-empty-title" data-i18n="mawl.no_networks">No networks yet</div>
                    <div class="network-empty-sub" data-i18n="mawl.use_add">Use "Add" above to create one.</div>
                </div>
            </div>
        </div>

        <!-- Tab bar -->
        <div class="tab-bar">
            <button class="tab-btn active" id="tab-btn-people" onclick="switchTab('people')" data-i18n="mawl.tab_people">People</button>
            <button class="tab-btn" id="tab-btn-playbook" onclick="switchTab('playbook')" data-i18n="mawl.tab_playbook">Playbook</button>
        </div>

        <!-- People tab -->
        <div id="tab-people" class="tab-panel">
            <div class="checklist-section" id="checklist-section" style="display:none">
                <div class="checklist-row">
                    <select class="checklist-select" id="checklist-select" onchange="selectChecklist(this.value)">
                        <option value="" data-i18n="mawl.select_person">— Select a person —</option>
                    </select>
                    <button class="add-checklist-btn" onclick="showCreateChecklist()" data-i18n="mawl.add_btn">+ Add</button>
                    <button class="add-checklist-btn share-checklist-btn" onclick="shareChecklist()" data-i18n="mawl.share_btn">Share</button>
                </div>
                <div class="checklist-loading" id="checklist-loading" data-i18n="mawl.loading" style="display:none">Loading…</div>
                <div class="checklist-empty" id="checklist-empty" data-i18n="mawl.no_people" style="display:none">No people yet. Use "+ Add" to create one.</div>
                <div class="create-checklist-form" id="create-checklist-form" style="display:none">
                    <input type="text" class="create-checklist-input" id="create-checklist-input"
                           data-i18n-placeholder="mawl.coached_leader_placeholder" placeholder="Coached leader's name" maxlength="80"
                           onkeydown="if(event.key==='Enter') submitCreateChecklist(); if(event.key==='Escape') cancelCreateChecklist()">
                    <div class="create-checklist-actions">
                        <button class="create-checklist-submit" id="create-checklist-submit" onclick="submitCreateChecklist()" data-i18n="mawl.add">Add</button>
                        <button type="button" class="create-checklist-cancel" onclick="cancelCreateChecklist()" data-i18n="mawl.cancel">Cancel</button>
                    </div>
                </div>
            </div>
            <div class="mawl-grid-section" id="mawl-grid-section" style="display:none"></div>
        </div>

        <!-- Playbook tab -->
        <div id="tab-playbook" class="tab-panel" style="display:none">
            <div id="manage-playbook-section" class="manage-playbook-section" style="display:none">
                <div class="manage-playbook-header-row">
                    <div class="manage-playbook-label" data-i18n="mawl.manage_playbook">Manage Playbook</div>
                    <button class="add-playbook-item-btn" onclick="showAddSection()" data-i18n="mawl.add_section">+ Add Section</button>
                </div>
                <div id="add-section-form" class="add-playbook-form" style="display:none">
                    <input type="text" id="add-section-input" class="playbook-item-input"
                           data-i18n-placeholder="mawl.section_title_placeholder" placeholder="Section title" maxlength="200"
                           onkeydown="if(event.key==='Enter') submitAddSection(); if(event.key==='Escape') cancelAddSection()">
                    <div class="playbook-item-form-actions">
                        <button class="create-network-submit" onclick="submitAddSection()" data-i18n="mawl.add">Add</button>
                        <button type="button" class="create-network-cancel" onclick="cancelAddSection()" data-i18n="mawl.cancel">Cancel</button>
                    </div>
                </div>
                <div id="manage-playbook-list"></div>
            </div>
        </div>

    </div>


</body>
